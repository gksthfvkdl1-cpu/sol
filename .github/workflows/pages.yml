# GitHub Pages: https://gksthfvkdl1-cpu.github.io/sol/
# 프론트만 배포됩니다. VITE_API_URL = API 베이스 origin(공개 URL만; 비밀키·DB URL은 넣지 마세요).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install and build
        env:
          VITE_API_URL: https://bvnlwpjjzptarpbwkeqn.supabase.co
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || '/sol/' }}
        run: |
          npm ci
          npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4

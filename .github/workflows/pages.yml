# GitHub Pages: https://gksthfvkdl1-cpu.github.io/sol/
# 프론트만 배포됩니다. SQLite API는 별도 서버(Railway 등)에 두고
# Secrets → VITE_API_URL 에 백엔드 origin (슬래시 없이) 을 넣으세요.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install and build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || '/sol/' }}
        run: |
          if [ -z "$VITE_API_URL" ]; then
            echo "::warning::VITE_API_URL secret 이 비어 있으면 배포 사이트에서 API가 동작하지 않습니다."
          fi
          npm ci
          npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4

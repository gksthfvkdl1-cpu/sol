# GitHub Pages: https://gksthfvkdl1-cpu.github.io/sol/
# Supabase: VITE_SUPABASE_URL(공개) + VITE_SUPABASE_ANON_KEY(Actions Secret)
# Cloudinary(선택): Repository variables VITE_CLOUDINARY_CLOUD_NAME + Secret VITE_CLOUDINARY_UPLOAD_PRESET

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install and build
        env:
          VITE_SUPABASE_URL: https://bvnlwpjjzptarpbwkeqn.supabase.co
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || '/sol/' }}
          VITE_AUTO_ADMIN_ID: ${{ secrets.VITE_AUTO_ADMIN_ID }}
          VITE_AUTO_ADMIN_PASSWORD: ${{ secrets.VITE_AUTO_ADMIN_PASSWORD }}
          VITE_INITIAL_NAV: ${{ vars.VITE_INITIAL_NAV || 'admin' }}
          # 환경 변수 누락 시에도 배포에서 기본값으로 동작하도록 fallback
          VITE_CLOUDINARY_CLOUD_NAME: ${{ vars.VITE_CLOUDINARY_CLOUD_NAME || 'djon3nvjm' }}
          VITE_CLOUDINARY_UPLOAD_PRESET: ${{ vars.VITE_CLOUDINARY_UPLOAD_PRESET || secrets.VITE_CLOUDINARY_UPLOAD_PRESET || 'seven_Sol' }}
        run: |
          npm ci
          npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
